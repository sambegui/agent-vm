<svg width="920" height="640" viewBox="0 0 920 640" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>agent-vm trust-boundary architecture</title>
  <desc>Operator requests pass through a promotion control plane, into an isolation substrate, with governance gates on higher-risk workloads.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#142233" />
      <stop offset="1" stop-color="#080d13" />
    </linearGradient>
    <linearGradient id="cyan" x1="0" x2="1">
      <stop offset="0" stop-color="#8ef6ff" />
      <stop offset="1" stop-color="#38bdf8" />
    </linearGradient>
    <linearGradient id="copper" x1="0" x2="1">
      <stop offset="0" stop-color="#f5c16f" />
      <stop offset="1" stop-color="#c76d3a" />
    </linearGradient>
    <filter id="soft-glow" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.42 0 0 0 0 0.91 0 0 0 0 1 0 0 0 .28 0" />
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <rect width="920" height="640" rx="34" fill="url(#panel)" />
  <circle cx="146" cy="122" r="190" fill="#38bdf8" opacity="0.07" />
  <circle cx="780" cy="488" r="220" fill="#f5c16f" opacity="0.055" />
  <path d="M520 58 800 188 706 560 360 498 410 250Z" fill="#0c1623" stroke="#20344c" stroke-width="2" opacity="0.5" />

  <g font-family="SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace" fill="#b7c8d8">
    <text x="72" y="82" font-size="16" letter-spacing="1.5">TRUST BOUNDARY</text>
    <text x="692" y="82" font-size="15" fill="#f5c16f">illustrative map</text>
  </g>

  <g transform="translate(74 128)">
    <rect width="252" height="78" rx="20" fill="#101a27" stroke="#3f5b76" stroke-width="2" />
    <text x="26" y="34" font-family="Aptos Display, SF Pro Display, Segoe UI Variable Display, ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="24" fill="#f8fbff">Operator</text>
    <text x="26" y="59" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace" font-size="15" fill="#8ef6ff">dry-run first</text>
  </g>

  <g transform="translate(230 270)" filter="url(#soft-glow)">
    <rect width="386" height="112" rx="24" fill="#101a27" stroke="#54d6ed" stroke-width="2.5" />
    <text x="30" y="45" font-family="Aptos Display, SF Pro Display, Segoe UI Variable Display, ui-sans-serif, system-ui, sans-serif" font-weight="750" font-size="29" fill="#f8fbff">Control plane</text>
    <text x="30" y="80" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace" font-size="16" fill="#b7c8d8">exact commit · preview → apply</text>
  </g>

  <g transform="translate(212 480)">
    <rect width="430" height="92" rx="24" fill="#101a27" stroke="#53657a" stroke-width="2" />
    <text x="30" y="39" font-family="Aptos Display, SF Pro Display, Segoe UI Variable Display, ui-sans-serif, system-ui, sans-serif" font-weight="750" font-size="28" fill="#f8fbff">Isolation substrate</text>
    <text x="30" y="67" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace" font-size="15" fill="#b7c8d8">defined as code · isolated profiles</text>
  </g>

  <path d="M300 206 C316 236 350 254 396 270" stroke="url(#cyan)" stroke-width="5" fill="none" stroke-linecap="round" />
  <path d="M418 382 C428 424 444 454 466 480" stroke="url(#cyan)" stroke-width="5" fill="none" stroke-linecap="round" />
  <circle cx="300" cy="206" r="7" fill="#8ef6ff" />
  <circle cx="396" cy="270" r="7" fill="#8ef6ff" />
  <circle cx="466" cy="480" r="7" fill="#8ef6ff" />

  <g transform="translate(650 158)">
    <rect width="210" height="318" rx="34" fill="#0b1722" stroke="url(#copper)" stroke-width="2.4" stroke-dasharray="12 10" opacity="0.95" />
    <text x="28" y="48" font-family="Aptos Display, SF Pro Display, Segoe UI Variable Display, ui-sans-serif, system-ui, sans-serif" font-weight="800" font-size="22" fill="#f5c16f">Governance</text>
    <text x="28" y="75" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace" font-size="14" fill="#ffd790">risk gates · audit</text>

    <g transform="translate(22 112)">
      <rect width="166" height="66" rx="18" fill="#0f2430" stroke="#f5c16f" stroke-width="1.8" />
      <text x="20" y="30" font-family="Aptos Display, SF Pro Display, Segoe UI Variable Display, ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="18" fill="#fff7e6">Tier-1 service</text>
      <text x="20" y="50" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace" font-size="12" fill="#ffd790">signed release</text>
    </g>

    <g transform="translate(22 214)">
      <rect width="166" height="66" rx="33" fill="#0b1722" stroke="#8ef6ff" stroke-width="1.8" stroke-dasharray="8 8" />
      <text x="20" y="30" font-family="Aptos Display, SF Pro Display, Segoe UI Variable Display, ui-sans-serif, system-ui, sans-serif" font-weight="700" font-size="18" fill="#f8fbff">Tier-2 job</text>
      <text x="20" y="50" font-family="SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace" font-size="12" fill="#b7c8d8">tear down</text>
    </g>
  </g>

  <path d="M616 326 C640 310 648 292 650 270" stroke="#f5c16f" stroke-width="3" stroke-dasharray="8 8" fill="none" opacity="0.72" />
</svg>
