<svg width="980" height="720" viewBox="0 0 980 720" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>BoundaryKit Agent VM layered reference architecture</title>
  <desc>Abstract public reference architecture showing public input, policy boundary, an OpenShell sandbox running a Hermes Agent workload, rootless runtime isolation, managed provider access, evidence receipts, and a NUC-class VM substrate. The diagram intentionally omits live topology.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#142233" />
      <stop offset="1" stop-color="#0a1018" />
    </linearGradient>
    <linearGradient id="accent" x1="0" x2="1">
      <stop offset="0" stop-color="#8ef6ff" />
      <stop offset="1" stop-color="#f5c16f" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
    <style>
      .mono { font-family: SFMono-Regular, Cascadia Code, Liberation Mono, ui-monospace, monospace; }
      .body { font-family: Aptos, Segoe UI, ui-sans-serif, system-ui, sans-serif; }
      .label { fill: #f8fbff; font-size: 23px; font-weight: 800; }
      .small { fill: #b7c8d8; font-size: 13px; }
      .tiny { fill: #7f93a8; font-size: 11px; letter-spacing: .4px; }
      .chip { fill: #8ef6ff; font-size: 11px; font-weight: 700; letter-spacing: .7px; }
    </style>
  </defs>

  <rect width="980" height="720" rx="28" fill="#070b10" />
  <rect x="1" y="1" width="978" height="718" rx="28" fill="none" stroke="rgba(142,246,255,.22)" />
  <circle cx="112" cy="96" r="180" fill="#38bdf8" opacity=".13" filter="url(#glow)" />
  <circle cx="870" cy="610" r="210" fill="#f5c16f" opacity=".1" filter="url(#glow)" />

  <g class="mono">
    <text x="44" y="58" fill="#8ef6ff" font-size="16" font-weight="800" letter-spacing="1.4">BOUNDARYKIT AGENT VM</text>
    <text x="936" y="58" text-anchor="end" fill="#f5c16f" font-size="13" font-weight="700">reference architecture - not live topology</text>
  </g>

  <g transform="translate(54 94)">
    <rect x="0" y="0" width="872" height="76" rx="18" fill="url(#panel)" stroke="#244258" />
    <text class="mono chip" x="28" y="26">PUBLIC EDGE</text>
    <text class="body label" x="28" y="54">Public input / operator intent</text>
    <text class="mono small" x="842" y="44" text-anchor="end">untrusted by default</text>
  </g>

  <g transform="translate(54 190)">
    <rect x="0" y="0" width="872" height="92" rx="18" fill="rgba(14,24,36,.9)" stroke="#8ef6ff" stroke-width="2" />
    <text class="mono chip" x="28" y="28">PROMOTION GATE</text>
    <text class="body label" x="28" y="60">Policy and promotion boundary</text>
    <text class="mono small" x="842" y="38" text-anchor="end">dry-run first</text>
    <text class="mono small" x="842" y="62" text-anchor="end">fail closed</text>
  </g>

  <g transform="translate(54 302)">
    <rect x="0" y="0" width="872" height="104" rx="18" fill="url(#panel)" stroke="#324960" />
    <text class="mono chip" x="28" y="30">EXECUTION BOUNDARY</text>
    <text class="body label" x="28" y="64">OpenShell sandbox + Hermes Agent</text>
    <text class="mono small" x="842" y="40" text-anchor="end">tool and data gates</text>
    <text class="mono small" x="842" y="66" text-anchor="end">measured public summary</text>
  </g>

  <g transform="translate(54 426)">
    <rect x="0" y="0" width="420" height="92" rx="18" fill="rgba(9,35,45,.86)" stroke="#38bdf8" />
    <text class="mono chip" x="24" y="29">ROOTLESS RUNTIME</text>
    <text class="body label" x="24" y="61">Rootless Podman runtime</text>
    <text class="mono tiny" x="24" y="80">least-privilege execution posture</text>
  </g>

  <g transform="translate(506 426)">
    <rect x="0" y="0" width="420" height="92" rx="18" fill="rgba(38,28,12,.86)" stroke="#f5c16f" />
    <text class="mono chip" x="24" y="29" fill="#f5c16f">PROVIDER BOUNDARY</text>
    <text class="body label" x="24" y="61">Managed inference access</text>
    <text class="mono tiny" x="24" y="80">credentials resolved outside the sandbox</text>
  </g>

  <g transform="translate(54 538)">
    <rect x="0" y="0" width="872" height="84" rx="18" fill="rgba(16,26,39,.7)" stroke="#324960" />
    <text class="mono chip" x="28" y="30">SUBSTRATE + EVIDENCE</text>
    <text class="body label" x="28" y="62">NUC-class VM substrate and receipts</text>
    <text class="mono small" x="842" y="48" text-anchor="end">public summaries only</text>
  </g>

  <g fill="none" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" opacity=".92">
    <path d="M490 171 L490 189" />
    <path d="M490 282 L490 301" />
    <path d="M490 406 L282 425" />
    <path d="M490 406 L718 425" />
    <path d="M282 518 L490 537" />
    <path d="M718 518 L490 537" />
  </g>

  <g class="mono" fill="#7f93a8" font-size="11" letter-spacing=".4">
    <text x="44" y="650">OMITTED BY DESIGN: hostnames, IP addresses, VM names, ports, routes, live service names, key names,</text>
    <text x="44" y="674">mount paths, logs, incidents, and recovery paths.</text>
    <text x="44" y="700">PUBLIC CLAIM DISCIPLINE: measured boundaries get receipts; deeper containment remains separately scoped.</text>
  </g>
</svg>
