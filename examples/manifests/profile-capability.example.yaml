# Illustrative per-profile capability contract (Ring 1 conversation-plane example). Fictional values.
# Every production profile declares what it may do; acceptance proves it before the profile is trusted.
profile: mcp
ring: 1
linux_user: agent-mcp
home: /opt/agent/gateways/mcp/home
service_unit: agent-gateway@mcp.service
gateways:
  - mcp_sse
toolsets_allowed:
  - messaging_read
  - session_search
toolsets_denied:
  - terminal
  - file
  - browser
  - computer_use
  - delegation
  - cron
  - spend
egress:
  mode: proxy_allowlist        # all internet egress via the approved local proxy
  direct_private_network: false
files:
  read_write:
    - /opt/agent/gateways/mcp/home
    - /opt/agent/gateways/mcp/logs
  denied_examples:
    - /opt/agent/gateways/core/home
    - /opt/agent/gateways/api/home
secrets:
  injection: file_or_systemd_credential   # refs only; never values
  values_in_git: false
  values_in_logs: false
acceptance:
  - cross_profile_read_denied
  - denied_tool_absent
  - egress_default_denied
  - dashboard_profile_scope_verified
  - rollback_unit_stop_verified
